<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Contact Form | Darknet001</title>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    
    <style>
        /* Modern styling for laptop and mobile */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #0f172a; /* Dark theme for a security feel */
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .contact-card { 
            background: #ffffff; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
            width: 100%; 
            max-width: 450px; 
        }
        h2 { color: #1e293b; margin-top: 0; text-align: center; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #475569; }
        input, select, textarea { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #cbd5e1; 
            border-radius: 6px; 
            box-sizing: border-box;
            font-size: 16px;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #e51937;
            ring: 2px solid rgba(229, 25, 55, 0.1);
        }
        .captcha-container {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }
        button { 
            width: 100%; 
            padding: 14px; 
            background: #e51937; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 18px; 
            font-weight: bold; 
            transition: 0.3s;
        }
        button:hover { background: #b3122a; }
    </style>
</head>
<body>

<div class="contact-card">
    <h2>Contact Support</h2>

    <form action="https://formspree.io/f/mqeyrjzz" method="POST">
        
        <div class="input-group">
            <label>Your Name</label>
            <input type="text" name="full_name" placeholder="Enter your name" required>
        </div>

        <div class="input-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="email@example.com" required>
        </div>

        <div class="input-group">
            <label>Service Type</label>
            <select name="inquiry_type">
                <option value="Security Audit">Security Audit</option>
                <option value="Web Development">Web Development</option>
                <option value="General Inquiry">General Question</option>
            </select>
        </div>

        <div class="input-group">
            <label>Message</label>
            <textarea name="message" rows="4" placeholder="How can I help you today?" required></textarea>
        </div>

        <input type="text" name="_gotcha" style="display:none">

        <div class="captcha-container">
            <div class="g-recaptcha" data-sitekey="6Ldt6_0UAAAAANPqS6E_9Q_Y9p5S6I_7Z_Q_Z_X"></div>
        </div>

        <button type="submit">Send Message</button>

    </form>
</div>

</body>
</html>
