<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form - Cybersecurity Project</title>
    <style>
        /* This makes the form look modern and clean */
        body { font-family: sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; padding: 50px; }
        .form-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #333; text-align: center; }
        .field { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #e51937; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background: #b3122a; }
    </style>
</head>
<body>

<div class="form-card">
    <h2>Contact Me</h2>

    <form action="https://formspree.io/f/mqeyrjzz" method="POST">
        
        <div class="field">
            <label>Full Name</label>
            <input type="text" name="visitor_name" placeholder="Basiru Salihu" required>
        </div>

        <div class="field">
            <label>Email Address</label>
            <input type="email" name="visitor_email" placeholder="email@example.com" required>
        </div>

        <div class="field">
            <label>Inquiry Type</label>
            <select name="service_requested">
                <option value="Penetration Testing">Penetration Testing</option>
                <option value="Web Development">Web Development</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="field">
            <label>Message</label>
            <textarea name="message" rows="4" placeholder="Tell me about your project..." required></textarea>
        </div>

        <button type="submit">Send Message</button>

    </form>
</div>

</body>
</html>
